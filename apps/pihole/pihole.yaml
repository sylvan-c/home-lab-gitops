apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole-config-pvc
  namespace: pihole
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole-dnsmasq-pvc
  namespace: pihole
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole-deployment
  namespace: pihole
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      containers:
      - name: pihole
        image: pihole/pihole:latest
        ports:
          - name: web-http
            containerPort: 80
          - name: web-https
            containerPort: 443
          - name: dns-tcp
            containerPort: 53
            protocol: TCP
          - name: dns-udp
            containerPort: 53
            protocol: UDP
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "2Gi"
        env:
        - name: TZ
          value: 'Europe/London'
        - name: FTLCONF_dns_listeningMode
          value: 'ALL'
        - name: PIHOLE_DNS_1
          value: 8.8.8.8
        - name: PIHOLE_DNS_2
          value: 8.8.4.4
        tty: true
        volumeMounts:
          - name: pihole-config-volume
            mountPath: /etc/pihole
          - name: pihole-dnsmasq-volume
            mountPath: /etc/dnsmasq.d
      volumes:
        - name: pihole-config-volume
          persistentVolumeClaim:
            claimName: pihole-config-pvc
        - name: pihole-dnsmasq-volume
          persistentVolumeClaim:
            claimName: pihole-dnsmasq-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns
  namespace: pihole
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.202
  ports:
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
  selector:
    app: pihole
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-web
  namespace: pihole
spec:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  selector:
    app: pihole
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: pihole-redirect
  namespace: pihole
spec:
  redirectRegex:
    regex: "^https?://pihole.home.lab/?$"
    replacement: "https://pihole.home.lab/admin/"
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pihole-ingressroute
  namespace: pihole
spec:
  entryPoints:
    - websecure
  routes:
    # Rule 1: Catch users hitting the bare domain and bounce their actual browser to /admin/
    - match: Host(`pihole.home.lab`) && Path(`/`)
      kind: Rule
      middlewares:
        - name: pihole-redirect
      services:
        - name: pihole-web
          port: 80

    # Rule 2: Pass everything under /admin cleanly to the backend container
    - match: Host(`pihole.home.lab`) && PathPrefix(`/admin`)
      kind: Rule
      services:
        - name: pihole-web
          port: 80
          passHostHeader: true
  tls: {}