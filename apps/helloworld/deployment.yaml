apiVersion: apps/v1
kind: Deployment
metadata:
  name: helloworld-deployment
  namespace: homelab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helloworld
  template:
    metadata:
      labels:
        app: helloworld
    spec:
      containers:
      - name: helloworld
        image: stefanprodan/podinfo:latest
        ports:
        - containerPort: 9898
---
apiVersion: v1
kind: Service
metadata:
  name: helloworld-service
  namespace: homelab
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 9898
  selector:
    app: helloworld