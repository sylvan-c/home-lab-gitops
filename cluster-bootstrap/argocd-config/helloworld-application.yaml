apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helloworld-application
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/sylvan-c/home-lab-gitops.git'
    targetRevision: main
    path: apps/helloworld
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: homelab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true