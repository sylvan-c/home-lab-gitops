apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://github.com/sylvan-c/home-lab-gitops.git
    targetRevision: main
    path: platform/namespaces
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true