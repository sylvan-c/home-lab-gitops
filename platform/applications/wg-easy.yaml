apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wg-easy-app
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/sylvan-c/home-lab-gitops.git'
    targetRevision: main
    path: apps/wg-easy
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: wg-easy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true